<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groupifier</title>
    <!-- Apply saved theme before paint to avoid a flash. -->
    <script>
      document.documentElement.setAttribute('data-theme', localStorage.getItem('ls_theme') || 'dark');
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/intro.css" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0f1220" />
    <meta name="description" content="Groupifier — learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <!-- Social / link previews -->
    <meta property="og:title" content="Groupifier" />
    <meta property="og:description" content="Learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://groupifier.com/" />
    <meta property="og:image" content="https://groupifier.com/img/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Groupifier" />
    <meta name="twitter:description" content="Learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <meta name="twitter:image" content="https://groupifier.com/img/og.png" />
  </head>
  <body>
    <!-- Groupifier logo intro. Covers the app on first load, then
         fades away. Controlled by /js/intro.js. -->
    <div id="intro-splash" aria-hidden="true">
      <div class="bf-logo">
        <div class="bf-mark" aria-label="Groupifier logo" role="img">
          <img class="bf-piece bf-piece-1" src="/img/intro/1.png" alt="" />
          <img class="bf-piece bf-piece-2" src="/img/intro/2.png" alt="" />
          <img class="bf-piece bf-piece-3" src="/img/intro/3.png" alt="" />
          <img class="bf-piece bf-piece-4" src="/img/intro/4.png" alt="" />
        </div>
      </div>
      <div class="bf-wordmark">Group<b>ifier</b></div>
      <div class="bf-skip">click to skip</div>
    </div>
    <script src="/js/intro.js"></script>

    <header class="topbar">
      <a class="brand" href="#/">Group<b>ifier</b></a>
      <nav class="topnav">
        <a href="#/community">Community</a>
        <a href="#/tips">Tips</a>
        <a class="auth-only" href="#/chat">Chat</a>
        <a class="auth-only" href="#/world">World</a>
        <!-- Games nav item hidden for now (focusing on World); route still works -->
        <a class="auth-only" href="#/decks">Flashcards</a>
        <a class="auth-only" href="#/messages">Messages</a>
        <a class="auth-only" href="#/settings">Settings</a>
      </nav>
      <form id="search-form" class="search-form">
        <input id="search-input" type="search" placeholder="Search words…" autocomplete="off" />
      </form>
      <div id="auth-area" class="auth-area"><!-- filled by auth.js --></div>
    </header>

    <!-- Languages: a horizontal carousel under the header (was a left sidebar) -->
    <div class="lang-bar" aria-label="Languages">
      <span class="lang-bar-label">Languages</span>
      <button id="lang-prev" class="lang-nav" type="button" aria-label="Scroll languages left" hidden>‹</button>
      <div class="lang-viewport">
        <nav id="language-list" class="language-list"></nav>
      </div>
      <button id="lang-next" class="lang-nav" type="button" aria-label="Scroll languages right" hidden>›</button>
    </div>

    <div class="layout">
      <!-- Main content: rendered by the router -->
      <main id="view" class="view"></main>
    </div>

    <!-- Simple modal used for auth + small forms -->
    <div id="modal-root"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
