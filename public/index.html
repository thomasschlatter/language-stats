<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Stats</title>
    <!-- Apply saved theme before paint to avoid a flash. -->
    <script>
      document.documentElement.setAttribute('data-theme', localStorage.getItem('ls_theme') || 'dark');
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/">Language&nbsp;Stats</a>
      <nav class="topnav">
        <a href="#/community">Community</a>
        <a href="#/chat">Chat</a>
        <a href="#/decks">Flashcards</a>
        <a href="#/messages">Messages</a>
        <a href="#/settings">Settings</a>
      </nav>
      <form id="search-form" class="search-form">
        <input id="search-input" type="search" placeholder="Search words…" autocomplete="off" />
      </form>
      <div id="auth-area" class="auth-area"><!-- filled by auth.js --></div>
    </header>

    <div class="layout">
      <!-- Left column: languages -->
      <aside class="sidebar">
        <button class="sidebar-title" id="lang-toggle" aria-expanded="true">
          <span>Languages</span><span class="caret">▾</span>
        </button>
        <nav id="language-list" class="language-list"></nav>
      </aside>

      <!-- Main content: rendered by the router -->
      <main id="view" class="view"></main>
    </div>

    <!-- Simple modal used for auth + small forms -->
    <div id="modal-root"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
