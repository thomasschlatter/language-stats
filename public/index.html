<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groupifier</title>
    <!-- Apply saved theme before paint to avoid a flash. -->
    <script>
      document.documentElement.setAttribute('data-theme', localStorage.getItem('ls_theme') || 'dark');
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/intro.css" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0f1220" />
    <meta name="description" content="Groupifier — learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <!-- Social / link previews -->
    <meta property="og:title" content="Groupifier" />
    <meta property="og:description" content="Learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://groupifier.com/" />
    <meta property="og:image" content="https://groupifier.com/img/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Groupifier" />
    <meta name="twitter:description" content="Learn languages by reading real text, build flashcards, and meet native speakers in a shared world." />
    <meta name="twitter:image" content="https://groupifier.com/img/og.png" />
  </head>
  <body>
    <!-- Groupifier logo intro. Covers the app on first load, then
         fades away. Controlled by /js/intro.js. -->
    <div id="intro-splash" aria-hidden="true">
      <div class="bf-logo">
        <div class="bf-mark" aria-label="Groupifier logo" role="img">
          <img class="bf-piece bf-piece-1" src="/img/intro/1.png" alt="" />
          <img class="bf-piece bf-piece-2" src="/img/intro/2.png" alt="" />
          <img class="bf-piece bf-piece-3" src="/img/intro/3.png" alt="" />
          <img class="bf-piece bf-piece-4" src="/img/intro/4.png" alt="" />
        </div>
      </div>
      <div class="bf-wordmark">Group<b>ifier</b></div>
      <div class="bf-skip">click to skip</div>
    </div>
    <script src="/js/intro.js"></script>

    <header class="topbar">
      <a class="brand" href="#/community" title="Community" aria-label="Community"><img src="/apple-touch-icon.png" alt="Groupifier" /></a>
      <nav class="topnav">
        <a href="#/tips" title="Tips" aria-label="Tips">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.5.4.9 1 1 1.6l.2 1.7h5.6l.2-1.7c.1-.6.5-1.2 1-1.6A7 7 0 0 0 12 2z"/></svg>
        </a>
        <a class="auth-only" href="#/world" title="World" aria-label="World">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
        <a class="auth-only" href="#/groups" title="Groups" aria-label="Groups">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </a>
        <a class="auth-only" href="#/decks" title="Flashcards" aria-label="Flashcards">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </a>
        <a class="auth-only" href="#/messages" title="Messages" aria-label="Messages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
        </a>
        <!-- Ask Foxy is reached by DMing Foxy (#/dm/Foxy). Games hidden; Settings in profile. -->
      </nav>
      <form id="search-form" class="search-form">
        <input id="search-input" type="search" placeholder="Search words…" autocomplete="off" />
      </form>
      <div id="auth-area" class="auth-area"><!-- filled by auth.js --></div>
    </header>

    <div class="layout">
      <!-- Main content: rendered by the router -->
      <main id="view" class="view"></main>
    </div>

    <!-- Collapsible chat drawer (filled by chatDrawer.js) -->
    <button id="chat-toggle" class="chat-toggle auth-only" title="Chat" aria-label="Toggle chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>
    <aside id="chat-drawer" class="chat-drawer" aria-hidden="true"></aside>

    <!-- Simple modal used for auth + small forms -->
    <div id="modal-root"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
